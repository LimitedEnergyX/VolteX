name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Compile orchestrator
        run: python -m py_compile orchestrator/orchestrator.py

      - name: Compile make_packet
        run: python -m py_compile tools/make_packet.py

      - name: Compile discord bridge bot
        run: python -m py_compile discord_bridge/bot.py

      - name: Compile discord bridge report
        run: python -m py_compile discord_bridge/report.py

      - name: Compile discord bridge review_runner
        run: python -m py_compile discord_bridge/review_runner.py

      - name: Smoke test -- orchestrator help
        run: python orchestrator/orchestrator.py --help

      - name: Smoke test -- make_packet help
        run: python tools/make_packet.py --help
