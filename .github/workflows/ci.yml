name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Compile orchestrator
        run: python -m py_compile orchestrator/orchestrator.py

      - name: Smoke test — help
        run: python orchestrator/orchestrator.py --help
